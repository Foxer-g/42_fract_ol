name: sanity_checks

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m pip install -U norminette
      - name: Norminette
        run: |
          set -o pipefail
          (norminette src/ || true) | grep -E ".+\.[ch]: Error\!|^Error:" && exit 1 || exit 0
  makefile:
    name: Makefile
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - name: compile libft
        run: make -j8
